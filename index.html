<!DOCTYPE html>

<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Palace Ledger Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🏮 Palace Ledger Admin Dashboard</h1>

    <button onclick="showForm()">
    + เพิ่มตัวละคร
    </button>
    
    <div id="formArea" style="display:none; margin-top:20px;">
    
    <input id="player" placeholder="ชื่อผู้เล่น"><br><br>
    
    <input id="name" placeholder="ชื่อตัวละคร"><br><br>
    
    <input id="role" placeholder="บทบาท"><br><br>
    
    <input id="position" placeholder="ตำแหน่ง"><br><br>
    
    <input id="palace" placeholder="ตำหนัก"><br><br>
    
    <input id="rp" placeholder="RP"><br><br>
    
    <input id="favor" placeholder="โปรดปราน"><br><br>
    
    <button onclick="addCharacter()">
    บันทึก
    </button>
    
    </div>
    
    <hr>
    
    <div id="characters"></div>
    
    <script src="script.js"></script>
</body>

</html>
