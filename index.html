<!DOCTYPE html>

<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Palace Ledger Admin</title>

<style>

body{

    background:#f6f1e8;

    font-family:sans-serif;

    max-width:900px;

    margin:auto;

    padding:20px;

}

h1{

    text-align:center;

}

.card{

    background:white;

    padding:16px;

    margin-bottom:16px;

    border-radius:12px;

    box-shadow:0 2px 8px rgba(0,0,0,.1);

}

.role{

    color:#666;

}

.stat{

    margin-top:8px;

}

button{

    margin-top:10px;

    padding:8px 12px;

}

</style>

</head>

<body>

<h1>🏮 Palace Ledger Admin</h1>

<div class="card">

<h2>หลี่ซูเหยา</h2>

<div>ผู้เล่น : แป้ง</div>

<div class="role">

พระสนม | ซู่อี้

</div>

<div>ตำหนัก : บุปผา</div>

<div class="stat">RP : 1200</div>

<div class="stat">โปรดปราน : 35</div>

<div class="stat">

ไอเท็ม :

<ul>

<li>หยกขาว x1</li>

<li>จดหมายลับ x2</li>

</ul>

</div>

<button>แก้ไข</button>

</div>

<div class="card">

<h2>จ้าวอิงเยว่</h2>

<div>ผู้เล่น : เมย์</div>

<div class="role">

นางกำนัล | ซ่างกง

</div>

<div>ตำหนัก : ตำหนักชิงเหอ</div>

<div class="stat">RP : 900</div>

<div class="stat">โปรดปราน : 12</div>

<div class="stat">

ไอเท็ม :

<ul>

<li>ผ้าไหม x3</li>

</ul>

</div>

<button>แก้ไข</button>

</div>

</body>

</html>
