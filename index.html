<!DOCTYPE html>

<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Palace Ledger Admin</title>

<style>

body{

    background:#f6f1e8;

    font-family:sans-serif;

    max-width:900px;

    margin:auto;

    padding:20px;

}

h1{

    text-align:center;

}

.card{

    background:white;

    padding:16px;

    margin-bottom:16px;

    border-radius:12px;

    box-shadow:0 2px 8px rgba(0,0,0,.1);

}

.role{

    color:#666;

}

.stat{

    margin-top:8px;

}

button{

    margin-top:10px;

    padding:8px 12px;

}

</style>

</head>

<body>

<h1>🏮 Palace Ledger Admin</h1>

<div id="characters"></div>
<script>

const characters = [

{
player:"แป้ง",
name:"หลี่ซูเหยา",
role:"พระสนม",
position:"ซู่อี้",
palace:"บุปผา",
rp:1200,
favor:35,
items:["หยกขาว x1","จดหมายลับ x2"]
},

{
player:"เมย์",
name:"จ้าวอิงเยว่",
role:"นางกำนัล",
position:"ซ่างกง",
palace:"ชิงเหอ",
rp:900,
favor:12,
items:["ผ้าไหม x3"]
}

];

const container = document.getElementById("characters");

characters.forEach(character => {

container.innerHTML += `

<div class="card">

<h2>${character.name}</h2>

<div>ผู้เล่น : ${character.player}</div>

<div class="role">
${character.role} | ${character.position}
</div>

<div>ตำหนัก : ${character.palace}</div>

<div class="stat">
RP : ${character.rp}
</div>

<div class="stat">
โปรดปราน : ${character.favor}
</div>

<div class="stat">
ไอเท็ม :
<ul>
${character.items.map(item => `<li>${item}</li>`).join("")}
</ul>
</div>

<button>แก้ไข</button>

</div>

`;

});

</script>

</body>

</html>
